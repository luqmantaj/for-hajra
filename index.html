<!DOCTYPE html>
<html>

<head>
<title>For Hajra ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

 <script src="script.js"></script>
<body>

<div class="hearts"></div>

<section class="intro">
<h1>Happy Birthday ❤️</h1>

<p>
I made a small playlist for you.<br>
Every song here reminds me of you.
</p>

<div class="scroll">
↓ scroll
</div>

</section>

<section class="playlist">

<h2>Birthday Playlist</h2>

<div class="song" onclick="playSong('songs/Sahiba.mp3')">

<img src="https://picsum.photos/80">

<div class="song-info">
<h3>Sahiba</h3>
<p>This song reminds me of you</p>
</div>


</section>
<div id="playerPanel" class="player-panel">

<div class="player-content">

<button class="close-btn" onclick="closePlayer()">✕</button>

<img id="playerImage" src="https://picsum.photos/300">

<h2 id="playerTitle">Song Title</h2>

<button id="playPauseBtn" onclick="togglePlay()">⏸</button>

<input type="range" id="progressBar" value="0">

</div>

</div>
<audio id="player"></audio>

<script src="script.js"></script>

</body>
</html>
